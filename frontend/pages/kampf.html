<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/CSS/style.css" />
    <title>Civil-Wars - Kaempfe</title>
  </head>
  <body>
    <header id="top-bar">
      <span class="game-title">Civil-Wars</span>
      <div id="resource-bar"></div>
    </header>

    <div id="app-layout">
      <nav id="sidebar"></nav>

      <main id="main-content">
        <div id="kampf-app">
          <div class="spy-tabs">
            <button class="spy-tab active" data-tab="missions">Laufende Kaempfe</button>
            <button class="spy-tab" data-tab="reports">Kampfberichte</button>
          </div>

          <section id="tab-missions" class="spy-section">
            <h2>⚔ Laufende Kaempfe</h2>
            <p class="spy-hint">
              Angriffe startest du auf der <a href="/pages/karte.html">Karte</a> ueber das Spieler-Menue.
            </p>

            <h3 style="margin-top: 16px; margin-bottom: 8px;">Meine Angriffe</h3>
            <div id="outgoing-list" class="spy-list">Wird geladen...</div>

            <h3 style="margin-top: 18px; margin-bottom: 8px;">Eingehende Angriffe</h3>
            <div id="incoming-list" class="spy-list">Wird geladen...</div>
          </section>

          <section id="tab-reports" class="spy-section" style="display:none">
            <h2>📋 Kampfberichte</h2>
            <div id="reports-list" class="spy-list">Wird geladen...</div>
          </section>
        </div>
      </main>

      <aside id="production-panel"></aside>
    </div>

    <div id="toast-container"></div>
    <script type="module" src="/scripts/kampf.js"></script>
  </body>
</html>
