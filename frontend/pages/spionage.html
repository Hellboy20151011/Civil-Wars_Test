<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/CSS/style.css" />
    <title>Civil-Wars – Spionage</title>
  </head>
  <body>
    <header id="top-bar">
      <span class="game-title">Civil-Wars</span>
      <div id="resource-bar"></div>
    </header>

    <div id="app-layout">
      <nav id="sidebar"></nav>

      <main id="main-content">
        <div id="spionage-app">
          <!-- Tabs -->
          <div class="spy-tabs">
            <button class="spy-tab active" data-tab="missions">Laufende Missionen</button>
            <button class="spy-tab" data-tab="reports">Spionageberichte</button>
          </div>

          <!-- Laufende Missionen -->
          <section id="tab-missions" class="spy-section">
            <h2>🕵️ Laufende Spionage-Missionen</h2>
            <p class="spy-hint">Starte Spionage-Missionen über die <a href="/pages/karte.html">Karte</a>, indem du auf einen Spieler klickst.</p>
            <div id="missions-list" class="spy-list">Wird geladen…</div>
          </section>

          <!-- Berichte -->
          <section id="tab-reports" class="spy-section" style="display:none">
            <h2>📋 Spionageberichte</h2>
            <div id="reports-list" class="spy-list">Wird geladen…</div>
          </section>
        </div>
      </main>

      <aside id="production-panel"></aside>
    </div>

    <div id="toast-container"></div>
    <script type="module" src="/scripts/spionage.js"></script>
  </body>
</html>
