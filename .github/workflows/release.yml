name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: civil_wars_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Abhängigkeiten installieren
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Tests ausführen
        working-directory: backend
        env:
          DB_USER: postgres
          DB_HOST: localhost
          DB_NAME: civil_wars_test
          DB_PASSWORD: postgres
          DB_PORT: 5432
          JWT_SECRET: test_secret_for_ci_only_minimum_32_chars
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
        run: npm test

      - name: Playwright Browser installieren
        working-directory: backend
        run: npx playwright install --with-deps chromium

      - name: Datenbank neu aufsetzen
        working-directory: backend
        env:
          DB_USER: postgres
          DB_HOST: localhost
          DB_NAME: civil_wars_test
          DB_PASSWORD: postgres
          DB_PORT: 5432
          JWT_SECRET: test_secret_for_ci_only_minimum_32_chars
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
        run: node scripts/resetdb.js

      - name: Backend starten
        working-directory: backend
        env:
          DB_USER: postgres
          DB_HOST: localhost
          DB_NAME: civil_wars_test
          DB_PASSWORD: postgres
          DB_PORT: 5432
          JWT_SECRET: test_secret_for_ci_only_minimum_32_chars
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
          PORT: 3000
          CORS_ORIGIN: http://localhost:3000
        run: node server.js &

      - name: Warten bis Backend bereit ist
        working-directory: backend
        run: npx wait-on http://localhost:3000/health --timeout 15000

      - name: E2E Tests ausführen
        working-directory: backend
        env:
          DB_USER: postgres
          DB_HOST: localhost
          DB_NAME: civil_wars_test
          DB_PASSWORD: postgres
          DB_PORT: 5432
          JWT_SECRET: test_secret_for_ci_only_minimum_32_chars
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
          PORT: 3000
          CORS_ORIGIN: http://localhost:3000
        run: npm run test:e2e

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
