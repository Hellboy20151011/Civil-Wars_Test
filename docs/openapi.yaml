openapi: 3.0.3
info:
  title: Civil Wars API
  version: 1.0.0
  description: Maschinenlesbare API-Spezifikation fuer Civil Wars (Backend).
servers:
  - url: http://localhost:3000
    description: Lokale Entwicklung

tags:
  - name: Health
  - name: Auth
  - name: Me
  - name: Resources
  - name: Buildings
  - name: Units

paths:
  /health:
    get:
      tags: [Health]
      summary: Health Check
      responses:
        '200':
          description: Server ist erreichbar
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      tags: [Auth]
      summary: Benutzer registrieren
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registrierung erfolgreich
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: Validierungs- oder Konfliktfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '503':
          description: Kein freier Koordinatenplatz verfuegbar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Benutzer einloggen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login erfolgreich
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Ungueltige Credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Account inaktiv
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Access-Token via Refresh-Token erneuern (Rotation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token erfolgreich erneuert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshSuccessResponse'
        '400':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Refresh-Token ungueltig oder abgelaufen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Account inaktiv
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Eigenes User-Profil aus Token lesen
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Userdaten
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/AuthUser'
        '401':
          description: Kein oder ungueltiger Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: User nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /me:
    get:
      tags: [Me]
      summary: Vollstaendiger Spielerstatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Spielerstatus
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStatus'
        '401':
          description: Kein oder ungueltiger Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /me/stream:
    get:
      tags: [Me]
      summary: SSE-Stream fuer Live-Statusupdates
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event-Stream geoeffnet
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: Token fehlt oder ist ungueltig
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Fehler beim Initialisieren des Streams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /resources/me:
    get:
      tags: [Resources]
      summary: Ressourcen des eingeloggten Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Ressourcenobjekt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourcesResponse'

  /buildings/types:
    get:
      tags: [Buildings]
      summary: Alle Gebaeudetypen
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste von Gebaeudetypen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BuildingType'

  /buildings/me:
    get:
      tags: [Buildings]
      summary: Eigene Gebaeude und Bauqueue
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Gebaeude + Queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingsMeResponse'

  /buildings/queue:
    get:
      tags: [Buildings]
      summary: Eigene Bauqueue
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Queueeintraege
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueueEntry'

  /buildings/build:
    post:
      tags: [Buildings]
      summary: Gebaeudebau starten
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildRequest'
      responses:
        '201':
          description: Bau gestartet oder sofort gebaut
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      message:
                        type: string
                      auftrag:
                        $ref: '#/components/schemas/QueueEntry'
                  - $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validierung/Ressourcen/Strom
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Gebaeudetyp oder Ressourcen nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /units/types:
    get:
      tags: [Units]
      summary: Alle Einheitentypen
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Einheitentypen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnitType'

  /units/types/category/{category}:
    get:
      tags: [Units]
      summary: Einheitentypen nach Kategorie
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: category
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Gefilterte Einheitentypen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnitType'

  /units/me:
    get:
      tags: [Units]
      summary: Eigene Einheiten
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Einheitenliste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserUnitDetailed'

  /units/train:
    post:
      tags: [Units]
      summary: Einheiten ausbilden
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainRequest'
      responses:
        '200':
          description: Ausbildung gestartet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitsActionSuccessResponse'
        '400':
          description: Validierung oder fachlicher Fehler
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/UnitsActionErrorResponse'

  /units/move:
    post:
      tags: [Units]
      summary: Einheit bewegen
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveRequest'
      responses:
        '200':
          description: Bewegung gestartet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitsActionSuccessResponse'
        '400':
          description: Validierung oder fachlicher Fehler
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/UnitsActionErrorResponse'

  /units/attack:
    post:
      tags: [Units]
      summary: Angriff ausfuehren
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttackRequest'
      responses:
        '200':
          description: Angriffsergebnis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitsActionSuccessResponse'
        '400':
          description: Validierung oder fachlicher Fehler
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/UnitsActionErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string

    AuthSuccessResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          minLength: 20

    RefreshSuccessResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
        refresh_token:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
        path:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorItem'

    ResourceValues:
      type: object
      properties:
        geld:
          type: number
        stein:
          type: number
        stahl:
          type: number
        treibstoff:
          type: number
        strom:
          type: number

    ResourcesResponse:
      type: object
      properties:
        resources:
          $ref: '#/components/schemas/ResourceValues'

    Building:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        anzahl:
          type: integer
        level:
          type: integer

    BuildingType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        level:
          type: integer
        money_cost:
          type: number
        stone_cost:
          type: number
        steel_cost:
          type: number
        fuel_cost:
          type: number
        build_time_ticks:
          type: integer
        money_production:
          type: number
        power_consumption:
          type: number

    QueueEntry:
      type: object
      properties:
        id:
          type: integer
        building_type_id:
          type: integer
        anzahl:
          type: integer
        fertig_am:
          type: string
          format: date-time

    BuildingsMeResponse:
      type: object
      properties:
        buildings:
          type: array
          items:
            $ref: '#/components/schemas/Building'
        queue:
          type: array
          items:
            $ref: '#/components/schemas/QueueEntry'

    PlayerStatus:
      type: object
      properties:
        resources:
          $ref: '#/components/schemas/ResourceValues'
        buildings:
          type: array
          items:
            $ref: '#/components/schemas/Building'
        queue:
          type: array
          items:
            $ref: '#/components/schemas/QueueEntry'
        strom:
          type: object
          additionalProperties: true
        production:
          type: object
          additionalProperties: true

    UnitType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        building_requirement:
          type: string
        money_cost:
          type: number
        steel_cost:
          type: number
        fuel_cost:
          type: number
        training_time_ticks:
          type: integer
        hitpoints:
          type: number
        attack_points:
          type: number
        defense_points:
          type: number
        movement_speed:
          type: number
        special_ability:
          type: string
          nullable: true

    UserUnitDetailed:
      type: object
      properties:
        id:
          type: integer
        quantity:
          type: integer
        health_percentage:
          type: number
        experience_points:
          type: number
        location_x:
          type: number
        location_y:
          type: number
        is_moving:
          type: boolean
        destination_x:
          type: number
          nullable: true
        destination_y:
          type: number
          nullable: true
        arrival_time:
          type: string
          format: date-time
          nullable: true
        name:
          type: string
        category:
          type: string

    UnitsActionSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: true

    UnitsActionErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    BuildRequest:
      type: object
      required: [building_type_id]
      properties:
        building_type_id:
          type: integer
          minimum: 1
        anzahl:
          type: integer
          minimum: 1
          default: 1

    TrainRequest:
      type: object
      required: [unit_type_id]
      properties:
        unit_type_id:
          type: integer
          minimum: 1
        quantity:
          type: integer
          minimum: 1
          default: 1

    MoveRequest:
      type: object
      required: [user_unit_id, destination_x, destination_y]
      properties:
        user_unit_id:
          type: integer
          minimum: 1
        destination_x:
          type: number
        destination_y:
          type: number

    AttackRequest:
      type: object
      required: [attacking_unit_id, target_unit_id]
      properties:
        attacking_unit_id:
          type: integer
          minimum: 1
        target_unit_id:
          type: integer
          minimum: 1
